name: sandbox-full-check

on:
  workflow_dispatch:
    inputs:
      auth_mode:
        description: "Auth mode to test (api_token or oauth2)"
        required: true
        default: "api_token"
        type: choice
        options:
          - api_token
          - oauth2
  schedule:
    - cron: '17 4 * * *'

concurrency:
  group: sandbox-full-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          tools: composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run full sandbox check
        env:
          WISE_AUDIT_STRICT: '1'
          WISE_AUTH_MODE: ${{ github.event_name == 'schedule' && 'api_token' || inputs.auth_mode }}
          WISE_BASE_URL: ${{ secrets.WISE_BASE_URL }}
          WISE_PROFILE_ID: ${{ secrets.WISE_PROFILE_ID }}
          WISE_API_TOKEN: ${{ secrets.WISE_API_TOKEN }}
          WISE_ACCESS_TOKEN: ${{ secrets.WISE_ACCESS_TOKEN }}
          WISE_REFRESH_TOKEN: ${{ secrets.WISE_REFRESH_TOKEN }}
          WISE_CLIENT_ID: ${{ secrets.WISE_CLIENT_ID }}
          WISE_CLIENT_SECRET: ${{ secrets.WISE_CLIENT_SECRET }}
          WISE_OAUTH_TOKEN_URL: ${{ secrets.WISE_OAUTH_TOKEN_URL }}
          WISE_SOURCE_CURRENCY: ${{ secrets.WISE_SOURCE_CURRENCY }}
          WISE_TARGET_CURRENCY: ${{ secrets.WISE_TARGET_CURRENCY }}
          WISE_SOURCE_AMOUNT: ${{ secrets.WISE_SOURCE_AMOUNT }}
          WISE_TARGET_AMOUNT: ${{ secrets.WISE_TARGET_AMOUNT }}
          WISE_RECIPIENT_CURRENCY: ${{ secrets.WISE_RECIPIENT_CURRENCY }}
          WISE_RECIPIENT_TYPE: ${{ secrets.WISE_RECIPIENT_TYPE }}
          WISE_RECIPIENT_HOLDER_NAME: ${{ secrets.WISE_RECIPIENT_HOLDER_NAME }}
          WISE_RECIPIENT_DETAILS_JSON: ${{ secrets.WISE_RECIPIENT_DETAILS_JSON }}
          WISE_CLIENT_KEY: ${{ secrets.WISE_CLIENT_KEY }}
          WISE_WEBHOOK_URL: ${{ secrets.WISE_WEBHOOK_URL }}
        run: php examples/sandbox_full_check.php "${WISE_AUTH_MODE}"
