name: sandbox-smoke

on:
  workflow_dispatch:
    inputs:
      auth_mode:
        description: "Auth mode to test (api_token or oauth2)"
        required: true
        default: "api_token"
        type: choice
        options:
          - api_token
          - oauth2

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          tools: composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run sandbox smoke test
        env:
          WISE_AUTH_MODE: ${{ inputs.auth_mode }}
          WISE_BASE_URL: ${{ secrets.WISE_BASE_URL }}
          WISE_PROFILE_ID: ${{ secrets.WISE_PROFILE_ID }}
          WISE_API_TOKEN: ${{ secrets.WISE_API_TOKEN }}
          WISE_ACCESS_TOKEN: ${{ secrets.WISE_ACCESS_TOKEN }}
          WISE_REFRESH_TOKEN: ${{ secrets.WISE_REFRESH_TOKEN }}
          WISE_CLIENT_ID: ${{ secrets.WISE_CLIENT_ID }}
          WISE_CLIENT_SECRET: ${{ secrets.WISE_CLIENT_SECRET }}
          WISE_OAUTH_TOKEN_URL: ${{ secrets.WISE_OAUTH_TOKEN_URL }}
          WISE_SOURCE_CURRENCY: ${{ secrets.WISE_SOURCE_CURRENCY }}
          WISE_TARGET_CURRENCY: ${{ secrets.WISE_TARGET_CURRENCY }}
          WISE_TARGET_AMOUNT: ${{ secrets.WISE_TARGET_AMOUNT }}
        run: php examples/sandbox_smoke.php "${{ inputs.auth_mode }}"
